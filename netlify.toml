# ============================================================
# OISignalFlow — netlify.toml
# Netlify deployment configuration for the dashboard frontend
# ============================================================

[build]
  # Root of the repo IS the OISignalFlow folder (all files at top level)
  publish = "."
  # No build command needed — pure static HTML/CSS/JS
  command = ""

# ── Cache headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "SAMEORIGIN"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"

# HTML — never cache (always fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS — short cache (5 min) so updates pick up quickly
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=300"

# CSS — short cache
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=300"

# config.json — never cache (live data bridge)
[[headers]]
  for = "/config.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
