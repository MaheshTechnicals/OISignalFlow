# ============================================================
# OISignalFlow — netlify.toml
# ============================================================

[build]
  publish = "."
  command = ""

# ── Proxy Redirect ─────────────────────────────────────────
# Browser fetches /api/config.json from Netlify (HTTPS).
# Netlify proxies server-side to the VM (HTTP) — no mixed content.
[[redirects]]
  from   = "/api/config.json"
  # ⚠️  VM IP is hardcoded below.
  # If your DigitalOcean VM IP changes, update this URL
  # then: git add netlify.toml && git commit -m "Update VM IP"
  #        && git push origin main  (Netlify auto-redeploys)
  to     = "http://167.71.224.25:8080/config.json"
  status = 200
  force  = true

# ── Cache Headers ──────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/api/config.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
